# LLM API 配置
llm:
  provider: "openai"
  api_key: ""
  model: "gpt-4o-mini"
  summary_model: "gpt-4o-mini"
  base_url: ""

# 扫描配置
scan:
  default_paths:
    desktop: true
    documents: true
    downloads: true
  paths: []
  exclude_patterns:
    - "node_modules"
    - ".git"
    - "__pycache__"
    - "AppData"

# 分类批次大小（建议 10-30）
batch_size: 30

# 分类并发请求数（1-4）
classification_workers: 2

# 摘要并发请求数（1-8）
summary_workers: 4
